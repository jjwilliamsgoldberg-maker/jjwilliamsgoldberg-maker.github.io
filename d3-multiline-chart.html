<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Line Chart - Genre Ratings Over Time</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .axis-label {
            font-size: 14px;
            font-weight: bold;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .line {
            fill: none;
            stroke-width: 2.5;
        }
        .dot {
            stroke: #fff;
            stroke-width: 1;
        }
    </style>
</head>
<body>
    <h1>Multi-Line Chart: Genre Ratings Over Time</h1>
    <a href="a7.html">← Back to A7</a>
    
    <div id="chart"></div>
    
    <script>
        /*
         * References:
         * - D3 Multi-Line Chart: https://d3-graph-gallery.com/graph/line_several_group.html
         * - d3-legend library: https://d3-legend.susielu.com/
         * - D3 Documentation: https://d3js.org/
         */

        // Set dimensions and margins
        const margin = {top: 60, right: 180, bottom: 70, left: 80};
        const width = 950 - margin.left - margin.right;
        const height = 500 - margin.top - margin.bottom;

        // Create SVG element
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Load data from CSV
        d3.csv("data/novels.csv").then(function(data) {
            
            // Filter valid data
            const validData = data.filter(d => 
                d.pub_year && d.gr_avg_rating && d.genre &&
                !isNaN(+d.pub_year) && !isNaN(+d.gr_avg_rating) &&
                d.genre !== 'na' && d.genre !== ''
            ).map(d => ({
                year: +d.pub_year,
                decade: Math.floor(+d.pub_year / 10) * 10,
                rating: +d.gr_avg_rating,
                genre: d.genre
            }));

            // Get top 4 genres by count
            const genreCounts = d3.rollup(validData, v => v.length, d => d.genre);
            const topGenres = Array.from(genreCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 4)
                .map(d => d[0]);

            // Filter to only top genres
            const filteredData = validData.filter(d => topGenres.includes(d.genre));

            // Group by genre and decade, calculate average rating
            const nestedData = d3.rollup(
                filteredData,
                v => d3.mean(v, d => d.rating),
                d => d.genre,
                d => d.decade
            );

            // Convert to array format for plotting
            const lineData = topGenres.map(genre => {
                const decadeMap = nestedData.get(genre);
                const values = Array.from(decadeMap, ([decade, rating]) => ({
                    decade: decade,
                    rating: rating
                })).sort((a, b) => a.decade - b.decade);
                return {
                    genre: genre,
                    values: values
                };
            });

            // Get all decades for x-axis
            const allDecades = [...new Set(filteredData.map(d => d.decade))].sort();

            // Create scales
            const x = d3.scaleLinear()
                .domain(d3.extent(allDecades))
                .range([0, width]);

            const y = d3.scaleLinear()
                .domain([3.2, 4.5])
                .range([height, 0]);

            const color = d3.scaleOrdinal()
                .domain(topGenres)
                .range(d3.schemeCategory10);

            // Add X axis
            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).tickFormat(d3.format("d")).ticks(10));

            // Add Y axis
            svg.append("g")
                .call(d3.axisLeft(y).ticks(6));

            // Add grid lines
            svg.append("g")
                .attr("class", "grid")
                .attr("opacity", 0.1)
                .call(d3.axisLeft(y).tickSize(-width).tickFormat(""));

            // Add X axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", height + 50)
                .text("Decade");

            // Add Y axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", -50)
                .text("Average Goodreads Rating");

            // Add chart title
            svg.append("text")
                .attr("class", "title")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", -30)
                .text("Average Rating by Decade for Top 4 Genres");

            // Create line generator
            const line = d3.line()
                .x(d => x(d.decade))
                .y(d => y(d.rating))
                .curve(d3.curveMonotoneX);

            // Add lines for each genre
            lineData.forEach(genreData => {
                svg.append("path")
                    .datum(genreData.values)
                    .attr("class", "line")
                    .attr("stroke", color(genreData.genre))
                    .attr("d", line);

                // Add dots
                svg.selectAll(`.dot-${genreData.genre}`)
                    .data(genreData.values)
                    .enter()
                    .append("circle")
                    .attr("class", "dot")
                    .attr("cx", d => x(d.decade))
                    .attr("cy", d => y(d.rating))
                    .attr("r", 4)
                    .attr("fill", color(genreData.genre));
            });

            // Create color legend using d3-legend
            const legendOrdinal = d3.legendColor()
                .shape("line")
                .shapeWidth(30)
                .orient('vertical')
                .scale(color)
                .title("Genre");

            svg.append("g")
                .attr("class", "legendOrdinal")
                .attr("transform", `translate(${width + 20}, 20)`)
                .call(legendOrdinal);

        }).catch(function(error) {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
