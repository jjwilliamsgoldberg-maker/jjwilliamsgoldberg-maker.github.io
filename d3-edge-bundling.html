<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge Bundling Diagram</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .node circle {
            fill: #fff;
            stroke-width: 2px;
            cursor: pointer;
        }
        .node text {
            font-size: 10px;
        }
        .link {
            fill: none;
            stroke-opacity: 0.4;
            stroke-width: 1.5px;
        }
        .link:hover {
            stroke-opacity: 1;
            stroke-width: 2.5px;
        }
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .node:hover circle {
            stroke-width: 3px;
        }
        .node--highlight circle {
            r: 8;
        }
    </style>
</head>
<body>
    <h1>Hierarchical Edge Bundling</h1>
    <a href="a8.html">← Back to A8</a>
    
    <div id="chart"></div>
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        /*
         * References:
         * - D3 Hierarchical Edge Bundling: https://observablehq.com/@d3/hierarchical-edge-bundling
         * - Mike Bostock's Edge Bundling: https://mbostock.github.io/d3/talk/20111116/bundle.html
         * - Vega Edge Bundling Example: https://vega.github.io/vega/examples/edge-bundling/
         * - d3-legend library: https://d3-legend.susielu.com/
         * - Network Repository Dataset: http://networkrepository.com/fb-pages-government.php
         */

        const width = 900;
        const height = 900;
        const radius = Math.min(width, height) / 2 - 120;
        const innerRadius = radius - 80;

        const tooltip = d3.select("#tooltip");

        // Create SVG
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .append("g")
            .attr("transform", `translate(${width / 2},${height / 2})`);

        // Add title
        svg.append("text")
            .attr("class", "title")
            .attr("x", 0)
            .attr("y", -height / 2 + 30)
            .attr("text-anchor", "middle")
            .text("FB Government Pages with Hierarchical Edge Bundling");

        // Load data
        Promise.all([
            d3.csv("data/network-nodes.csv"),
            d3.csv("data/network-edges.csv")
        ]).then(function([nodes, links]) {
            
            // Parse data
            nodes = nodes.map(d => ({
                id: +d.id,
                name: d.name,
                group: +d.group
            }));

            links = links.map(d => ({
                source: +d.source,
                target: +d.target
            }));

            // Create color scale
            const color = d3.scaleOrdinal()
                .domain([1, 2, 3, 4, 5])
                .range(d3.schemeCategory10);

            // Sort nodes by group for better bundling
            nodes.sort((a, b) => a.group - b.group || a.id - b.id);

            // Create a map for quick lookup
            const nodeById = new Map(nodes.map((d, i) => [d.id, {...d, index: i}]));

            // Calculate positions on a circle
            const angleStep = (2 * Math.PI) / nodes.length;
            nodes.forEach((node, i) => {
                node.angle = i * angleStep - Math.PI / 2;
                node.x = Math.cos(node.angle) * radius;
                node.y = Math.sin(node.angle) * radius;
                node.innerX = Math.cos(node.angle) * innerRadius;
                node.innerY = Math.sin(node.angle) * innerRadius;
            });

            // Create curved path generator with bundling
            const bundle = d3.line()
                .curve(d3.curveBundle.beta(0.85))
                .x(d => d.x)
                .y(d => d.y);

            // Generate bundled paths
            function getBundledPath(source, target) {
                const sourceNode = nodeById.get(source);
                const targetNode = nodeById.get(target);
                
                if (!sourceNode || !targetNode) return null;

                // Create intermediate control points through center for bundling
                const midX = 0;
                const midY = 0;
                
                // Points: source -> inner source -> center -> inner target -> target
                return [
                    {x: sourceNode.x, y: sourceNode.y},
                    {x: sourceNode.innerX * 0.8, y: sourceNode.innerY * 0.8},
                    {x: midX, y: midY},
                    {x: targetNode.innerX * 0.8, y: targetNode.innerY * 0.8},
                    {x: targetNode.x, y: targetNode.y}
                ];
            }

            // Draw links
            const link = svg.append("g")
                .attr("class", "links")
                .selectAll("path")
                .data(links)
                .enter()
                .append("path")
                .attr("class", "link")
                .attr("d", d => {
                    const points = getBundledPath(d.source, d.target);
                    return points ? bundle(points) : null;
                })
                .attr("stroke", d => {
                    const sourceNode = nodeById.get(d.source);
                    return sourceNode ? color(sourceNode.group) : "#999";
                });

            // Draw nodes
            const node = svg.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(nodes)
                .enter()
                .append("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d.x},${d.y})`);

            node.append("circle")
                .attr("r", 6)
                .attr("fill", d => color(d.group))
                .attr("stroke", d => d3.color(color(d.group)).darker())
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", 10);
                    
                    // Highlight connected edges
                    link.attr("stroke-opacity", l => 
                        (l.source === d.id || l.target === d.id) ? 1 : 0.1
                    ).attr("stroke-width", l =>
                        (l.source === d.id || l.target === d.id) ? 2.5 : 1
                    );

                    // Count connections
                    const connections = links.filter(l => 
                        l.source === d.id || l.target === d.id
                    ).length;

                    tooltip.html(`<strong>${d.name}</strong><br/>Category: ${d.group}<br/>Connections: ${connections}`)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 30) + "px")
                        .style("opacity", 1);
                })
                .on("mouseout", function() {
                    d3.select(this).attr("r", 6);
                    link.attr("stroke-opacity", 0.4).attr("stroke-width", 1.5);
                    tooltip.style("opacity", 0);
                });

            // Add labels
            node.append("text")
                .attr("dy", "0.35em")
                .attr("x", d => d.angle > Math.PI / 2 && d.angle < 3 * Math.PI / 2 ? -12 : 12)
                .attr("text-anchor", d => d.angle > Math.PI / 2 && d.angle < 3 * Math.PI / 2 ? "end" : "start")
                .attr("transform", d => {
                    const angle = d.angle * 180 / Math.PI;
                    return d.angle > Math.PI / 2 && d.angle < 3 * Math.PI / 2 
                        ? `rotate(${angle + 180})` 
                        : `rotate(${angle})`;
                })
                .text(d => d.name.replace("User_", ""));

            // Create color legend
            const legendOrdinal = d3.legendColor()
                .shape("circle")
                .shapeRadius(6)
                .orient('vertical')
                .scale(color)
                .title("Category")
                .labels(["Military", "Diplomatic", "Local Gov", "Health", "Other"]);

            svg.append("g")
                .attr("class", "legendOrdinal")
                .attr("transform", `translate(${width / 2 - 120}, ${-height / 2 + 60})`)
                .call(legendOrdinal);

        }).catch(function(error) {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
