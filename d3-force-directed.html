<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force-Directed Node-Link Diagram</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .links line {
            stroke: #999;
            stroke-opacity: 0.6;
        }
        .nodes circle {
            stroke: #fff;
            stroke-width: 1.5px;
            cursor: pointer;
        }
        .tooltip {
            position: absolute;
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 14px;
            border-radius: 5px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .node-label {
            font-size: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>Force-Directed Node-Link Diagram</h1>
    <a href="a8.html">← Back to A8</a>
    
    <div id="chart"></div>
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        /*
         * References:
         * - D3 Force-Directed Graph: https://d3-graph-gallery.com/graph/network_basic.html
         * - D3 Force Simulation: https://d3js.org/d3-force
         * - d3-legend library: https://d3-legend.susielu.com/
         * - Network Repository Dataset: http://networkrepository.com/fb-pages-government.php
         */

        const width = 900;
        const height = 600;
        const margin = {top: 40, right: 150, bottom: 40, left: 40};

        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.right)
            .attr("height", height);

        const tooltip = d3.select("#tooltip");

        // Add title
        svg.append("text")
            .attr("class", "title")
            .attr("x", width / 2)
            .attr("y", 25)
            .attr("text-anchor", "middle")
            .text("FB Government Pages Network (Force-Directed Layout)");

        // Load both CSV files
        Promise.all([
            d3.csv("data/network-nodes.csv"),
            d3.csv("data/network-edges.csv")
        ]).then(function([nodes, links]) {
            
            // Parse data
            nodes = nodes.map(d => ({
                id: +d.id,
                name: d.name,
                group: +d.group
            }));

            links = links.map(d => ({
                source: +d.source,
                target: +d.target
            }));

            // Create color scale for groups
            const color = d3.scaleOrdinal()
                .domain([1, 2, 3, 4, 5])
                .range(d3.schemeCategory10);

            // Create force simulation
            const simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).distance(80))
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(20));

            // Create links
            const link = svg.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(links)
                .enter()
                .append("line")
                .attr("stroke-width", 1.5);

            // Create nodes
            const node = svg.append("g")
                .attr("class", "nodes")
                .selectAll("circle")
                .data(nodes)
                .enter()
                .append("circle")
                .attr("r", 10)
                .attr("fill", d => color(d.group))
                .on("mouseover", function(event, d) {
                    d3.select(this)
                        .attr("r", 14)
                        .attr("stroke", "#333")
                        .attr("stroke-width", 3);
                    
                    // Count connections
                    const connections = links.filter(l => 
                        l.source.id === d.id || l.target.id === d.id
                    ).length;
                    
                    tooltip.html(`<strong>${d.name}</strong><br/>Category: ${d.group}<br/>Connections: ${connections}`)
                        .style("left", (event.pageX + 15) + "px")
                        .style("top", (event.pageY - 30) + "px")
                        .style("opacity", 1);
                })
                .on("mouseout", function() {
                    d3.select(this)
                        .attr("r", 10)
                        .attr("stroke", "#fff")
                        .attr("stroke-width", 1.5);
                    tooltip.style("opacity", 0);
                })
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            // Add node labels
            const labels = svg.append("g")
                .attr("class", "labels")
                .selectAll("text")
                .data(nodes)
                .enter()
                .append("text")
                .attr("class", "node-label")
                .attr("dy", -15)
                .attr("text-anchor", "middle")
                .text(d => d.name.replace("User_", ""));

            // Update positions on tick
            simulation.on("tick", () => {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node
                    .attr("cx", d => d.x = Math.max(20, Math.min(width - 20, d.x)))
                    .attr("cy", d => d.y = Math.max(40, Math.min(height - 20, d.y)));

                labels
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            });

            // Drag functions
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            // Create color legend
            const legendOrdinal = d3.legendColor()
                .shape("circle")
                .shapeRadius(6)
                .orient('vertical')
                .scale(color)
                .title("Category")
                .labels(["Military", "Diplomatic", "Local Gov", "Health", "Other"]);

            svg.append("g")
                .attr("class", "legendOrdinal")
                .attr("transform", `translate(${width + 20}, 60)`)
                .call(legendOrdinal);

        }).catch(function(error) {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
