<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Chart in D3 - Novels Over Time</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .axis-label {
            font-size: 14px;
            font-weight: bold;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .line {
            fill: none;
            stroke-width: 3;
        }
        .dot {
            stroke: #fff;
            stroke-width: 1.5;
        }
    </style>
</head>
<body>
    <h1>Line Chart: Novel Trends Over Time (D3.js)</h1>
    <a href="a5.html">← Back to A5</a>
    
    <div id="chart"></div>
    
    <script>
        /*
         * References:
         * - D3 Line Chart: https://d3-graph-gallery.com/graph/line_basic.html
         * - D3 Time Scales: https://github.com/d3/d3-time
         * - Interactive Data Visualization for the Web (Chapter 11)
         * - D3 Documentation: https://d3js.org/
         */

        // Set dimensions and margins
        const margin = {top: 60, right: 30, bottom: 70, left: 80};
        const width = 900 - margin.left - margin.right;
        const height = 500 - margin.top - margin.bottom;

        // Create SVG element
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Load data from CSV
        d3.csv("data/novels.csv").then(function(data) {
            
            // Filter and parse data
            const parsedData = data
                .filter(d => d.pub_year && !isNaN(+d.pub_year) && +d.pub_year >= 1800)
                .map(d => ({
                    year: +d.pub_year,
                    rating: +d.gr_avg_rating || 0,
                    numRatings: +d.gr_num_ratings || 0
                }));

            // Group by decade and calculate averages
            const decadeData = d3.rollup(
                parsedData,
                v => ({
                    avgRating: d3.mean(v, d => d.rating),
                    count: v.length,
                    totalRatings: d3.sum(v, d => d.numRatings)
                }),
                d => Math.floor(d.year / 10) * 10
            );

            // Convert to array and sort by decade
            const lineData = Array.from(decadeData, ([decade, values]) => ({
                decade: decade,
                avgRating: values.avgRating,
                count: values.count,
                avgNumRatings: values.totalRatings / values.count
            })).sort((a, b) => a.decade - b.decade);

            // Create scales
            const x = d3.scaleLinear()
                .domain(d3.extent(lineData, d => d.decade))
                .range([0, width]);

            const y = d3.scaleLinear()
                .domain([3.2, 4.4])
                .range([height, 0]);

            // Add X axis
            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x)
                    .tickFormat(d3.format("d"))
                    .ticks(10));

            // Add Y axis
            svg.append("g")
                .call(d3.axisLeft(y).ticks(6));

            // Add grid lines
            svg.append("g")
                .attr("class", "grid")
                .attr("opacity", 0.1)
                .call(d3.axisLeft(y)
                    .tickSize(-width)
                    .tickFormat("")
                    .ticks(6));

            // Add X axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", height + 50)
                .text("Decade");

            // Add Y axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", -50)
                .text("Average Goodreads Rating");

            // Add chart title
            svg.append("text")
                .attr("class", "title")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", -30)
                .text("Average Goodreads Rating of Top 500 Novels by Decade");

            // Create line generator
            const line = d3.line()
                .x(d => x(d.decade))
                .y(d => y(d.avgRating))
                .curve(d3.curveMonotoneX);

            // Add the line
            svg.append("path")
                .datum(lineData)
                .attr("class", "line")
                .attr("stroke", "steelblue")
                .attr("d", line);

            // Add dots at each data point
            svg.selectAll(".dot")
                .data(lineData)
                .enter()
                .append("circle")
                .attr("class", "dot")
                .attr("cx", d => x(d.decade))
                .attr("cy", d => y(d.avgRating))
                .attr("r", 6)
                .attr("fill", "steelblue");

            // Add labels for each point
            svg.selectAll(".point-label")
                .data(lineData)
                .enter()
                .append("text")
                .attr("class", "point-label")
                .attr("x", d => x(d.decade))
                .attr("y", d => y(d.avgRating) - 12)
                .attr("text-anchor", "middle")
                .attr("font-size", "10px")
                .attr("fill", "#333")
                .text(d => d.avgRating.toFixed(2));

        }).catch(function(error) {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
