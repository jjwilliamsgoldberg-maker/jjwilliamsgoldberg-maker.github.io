<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualitative Scatterplot - Novels by Genre</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .axis-label {
            font-size: 14px;
            font-weight: bold;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .dot {
            opacity: 0.7;
            stroke: #333;
            stroke-width: 0.5;
        }
        .dot:hover {
            opacity: 1;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <h1>Qualitative Color Scale: Novels by Genre</h1>
    <a href="a6.html">← Back to A6</a>
    
    <div id="chart"></div>
    
    <script>
        /*
         * References:
         * - D3 Categorical/Qualitative Scales: https://d3js.org/d3-scale-chromatic/categorical
         * - d3-legend library: https://d3-legend.susielu.com/
         * - D3 Scatterplot: https://d3-graph-gallery.com/graph/scatter_basic.html
         */

        // Set dimensions and margins
        const margin = {top: 60, right: 180, bottom: 70, left: 80};
        const width = 1000 - margin.left - margin.right;
        const height = 550 - margin.top - margin.bottom;

        // Create SVG element
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

        // Load data from CSV
        d3.csv("data/novels.csv").then(function(data) {
            
            // Filter and parse data
            const scatterData = data
                .filter(d => d.pub_year && d.gr_avg_rating && 
                            !isNaN(+d.pub_year) && !isNaN(+d.gr_avg_rating))
                .map(d => ({
                    year: +d.pub_year,
                    rating: +d.gr_avg_rating,
                    genre: (d.genre === 'na' || d.genre === '') ? 'Other' : d.genre,
                    title: d.title
                }));

            // Get unique genres sorted alphabetically
            const genres = [...new Set(scatterData.map(d => d.genre))].sort();

            // Create X scale (Publication Year)
            const x = d3.scaleLinear()
                .domain([d3.min(scatterData, d => d.year) - 10, d3.max(scatterData, d => d.year) + 10])
                .range([0, width]);

            // Create Y scale (Rating)
            const y = d3.scaleLinear()
                .domain([d3.min(scatterData, d => d.rating) - 0.2, d3.max(scatterData, d => d.rating) + 0.2])
                .range([height, 0]);

            // Create Qualitative color scale
            const colorScale = d3.scaleOrdinal()
                .domain(genres)
                .range(d3.schemeCategory10);

            // Add X axis
            svg.append("g")
                .attr("transform", `translate(0,${height})`)
                .call(d3.axisBottom(x).tickFormat(d3.format("d")));

            // Add Y axis
            svg.append("g")
                .call(d3.axisLeft(y));

            // Add grid lines
            svg.append("g")
                .attr("class", "grid")
                .attr("opacity", 0.1)
                .call(d3.axisLeft(y)
                    .tickSize(-width)
                    .tickFormat(""));

            // Add X axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", height + 50)
                .text("Publication Year");

            // Add Y axis label
            svg.append("text")
                .attr("class", "axis-label")
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .attr("x", -height / 2)
                .attr("y", -50)
                .text("Goodreads Average Rating");

            // Add chart title
            svg.append("text")
                .attr("class", "title")
                .attr("text-anchor", "middle")
                .attr("x", width / 2)
                .attr("y", -30)
                .text("Publication Year vs Rating by Genre (Qualitative Color Scale)");

            // Add dots with qualitative color
            svg.selectAll(".dot")
                .data(scatterData)
                .enter()
                .append("circle")
                .attr("class", "dot")
                .attr("cx", d => x(d.year))
                .attr("cy", d => y(d.rating))
                .attr("r", 6)
                .attr("fill", d => colorScale(d.genre));

            // Create color legend using d3-legend
            const legendOrdinal = d3.legendColor()
                .shape("circle")
                .shapeRadius(6)
                .orient('vertical')
                .scale(colorScale)
                .title("Genre");

            svg.append("g")
                .attr("class", "legendOrdinal")
                .attr("transform", `translate(${width + 20}, 20)`)
                .call(legendOrdinal);

        }).catch(function(error) {
            console.error("Error loading CSV:", error);
        });
    </script>
</body>
</html>
