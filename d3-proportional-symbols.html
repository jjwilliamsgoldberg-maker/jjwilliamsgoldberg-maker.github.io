<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proportional Symbols Map - US Cost of Living</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://d3js.org/topojson.v3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        a {
            margin-bottom: 20px;
            color: #3498db;
        }
        .state {
            fill: #ddd;
            stroke: #999;
            stroke-width: 0.5px;
        }
        .bubble {
            fill-opacity: 0.7;
            stroke: #fff;
            stroke-width: 1px;
        }
        .bubble:hover {
            fill-opacity: 1;
            stroke-width: 2px;
        }
        .tooltip {
            position: absolute;
            background: white;
            border: 1px solid #999;
            border-radius: 5px;
            padding: 10px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
        }
        .legend-title {
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Proportional Symbols Map: US Cost of Living Index</h1>
    <a href="a9.html">← Back to A9</a>
    
    <div id="chart"></div>
    <div class="tooltip" id="tooltip"></div>
    
    <script>
        /*
         * References:
         * - D3 Geo Projections: https://d3js.org/d3-geo/projection
         * - TopoJSON: https://github.com/topojson/topojson
         * - d3-legend: https://d3-legend.susielu.com/
         * - Proportional Symbols: https://d3-graph-gallery.com/graph/bubblemap_basic.html
         */
        
        const width = 960;
        const height = 600;
        const margin = {top: 20, right: 150, bottom: 20, left: 20};
        
        const svg = d3.select("#chart")
            .append("svg")
            .attr("width", width + margin.right)
            .attr("height", height);
        
        const tooltip = d3.select("#tooltip");
        
        // US Albers projection
        const projection = d3.geoAlbersUsa()
            .scale(1200)
            .translate([width / 2, height / 2]);
        
        const path = d3.geoPath().projection(projection);
        
        // Load all data files
        Promise.all([
            d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json"),
            d3.csv("data/expensive-states.csv"),
            d3.csv("data/state-centroids.csv")
        ]).then(([us, costData, centroids]) => {
            
            // Create a lookup map for centroids by state name
            const centroidMap = new Map();
            centroids.forEach(d => {
                centroidMap.set(d.state, {lat: +d.lat, lng: +d.lng});
            });
            
            // Merge cost data with centroids
            costData.forEach(d => {
                d.costIndex = +d.costIndex;
                d.housingCost = +d.housingCost;
                const coords = centroidMap.get(d.State);
                if (coords) {
                    d.lat = coords.lat;
                    d.lng = coords.lng;
                }
            });
            
            // Filter to only states with coordinates
            const mergedData = costData.filter(d => d.lat && d.lng);
            
            // Draw states
            const states = topojson.feature(us, us.objects.states);
            svg.append("g")
                .selectAll("path")
                .data(states.features)
                .join("path")
                .attr("class", "state")
                .attr("d", path);
            
            // Size scale for bubbles (based on costIndex)
            const sizeScale = d3.scaleSqrt()
                .domain([d3.min(mergedData, d => d.costIndex), d3.max(mergedData, d => d.costIndex)])
                .range([5, 40]);
            
            // Color scale for bubbles (based on housingCost)
            const colorScale = d3.scaleSequential()
                .domain([d3.min(mergedData, d => d.housingCost), d3.max(mergedData, d => d.housingCost)])
                .interpolator(d3.interpolateReds);
            
            // Draw bubbles
            svg.append("g")
                .selectAll("circle")
                .data(mergedData.filter(d => projection([d.lng, d.lat])))
                .join("circle")
                .attr("class", "bubble")
                .attr("cx", d => {
                    const coords = projection([d.lng, d.lat]);
                    return coords ? coords[0] : 0;
                })
                .attr("cy", d => {
                    const coords = projection([d.lng, d.lat]);
                    return coords ? coords[1] : 0;
                })
                .attr("r", d => sizeScale(d.costIndex))
                .attr("fill", d => colorScale(d.housingCost))
                .on("mouseover", function(event, d) {
                    tooltip.style("opacity", 1)
                        .html(`<strong>${d.State}</strong><br>
                               Cost Index: ${d.costIndex}<br>
                               Housing Cost: ${d.housingCost}<br>
                               Rank: #${d.costRank}`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 10) + "px");
                })
                .on("mouseout", function() {
                    tooltip.style("opacity", 0);
                });
            
            // Size Legend
            const sizeLegend = svg.append("g")
                .attr("transform", `translate(${width + 20}, 50)`);
            
            sizeLegend.append("text")
                .attr("class", "legend-title")
                .attr("x", 0)
                .attr("y", 0)
                .text("Cost Index (Size)");
            
            const sizeLegendValues = [90, 130, 190];
            sizeLegendValues.forEach((val, i) => {
                const r = sizeScale(val);
                sizeLegend.append("circle")
                    .attr("cx", 30)
                    .attr("cy", 40 + i * 50)
                    .attr("r", r)
                    .attr("fill", "none")
                    .attr("stroke", "#999");
                
                sizeLegend.append("text")
                    .attr("x", 70)
                    .attr("y", 45 + i * 50)
                    .attr("font-size", "11px")
                    .text(val);
            });
            
            // Color Legend
            const colorLegend = svg.append("g")
                .attr("transform", `translate(${width + 20}, 250)`);
            
            colorLegend.append("text")
                .attr("class", "legend-title")
                .attr("x", 0)
                .attr("y", 0)
                .text("Housing Cost (Color)");
            
            const legendColorScale = d3.legendColor()
                .shapeWidth(20)
                .shapeHeight(15)
                .cells(5)
                .orient("vertical")
                .scale(colorScale)
                .labelFormat(d3.format(".0f"));
            
            colorLegend.append("g")
                .attr("transform", "translate(0, 15)")
                .call(legendColorScale);
        });
    </script>
</body>
</html>
